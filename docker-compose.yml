      - JWT_SECRET=change-me-to-a-strong-random-secret
      - GMAIL_USER=matte1240@gmail.com
      - GMAIL_APP_PASSWORD=gszu arfc ixrn zwqb
      - ORDER_EMAIL_TO=matte1240@gmail.com
