services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-listino
    restart: unless-stopped
    ports:
      - "3000:3000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - NODE_ENV=production
      - JWT_SECRET=change-me-to-a-strong-random-secret
      - GMAIL_USER=
      - GMAIL_APP_PASSWORD=
      - ORDER_EMAIL_TO=
      - COOKIE_SECURE=false
      - AI_MODEL=gpt-4o-mini
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
