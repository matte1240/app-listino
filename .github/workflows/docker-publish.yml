name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"           # triggers on version tags like v1.0.0
  pull_request:
    branches:
      - main               # build only (no push) on PRs to main
  workflow_dispatch:       # allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # matte1240/app-listino

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # needed to push to GHCR

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Docker Buildx (multi-platform support + cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login to GitHub Container Registry
      #    On PRs this step is skipped automatically (no GITHUB_TOKEN write)
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Extract metadata (tags + labels) from Git context
      #    branch push  → ghcr.io/matte1240/app-listino:main
      #    tag v1.2.3   → ghcr.io/matte1240/app-listino:1.2.3 + :latest
      #    PR           → ghcr.io/matte1240/app-listino:pr-42 (not pushed)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # 5. Build (and push if not a PR)
      #    Layer cache stored in GitHub Actions cache to speed up future builds
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # 6. Print image digest for traceability
      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "Published ${{ steps.meta.outputs.tags }}"
